<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Authentication Required</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e2e8f0}
.card{background:#1e293b;border-radius:12px;padding:40px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,0.3)}
h1{font-size:20px;margin-bottom:8px;text-align:center}
p{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:24px}
input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:15px;outline:none;margin-bottom:16px;transition:border-color .2s}
input:focus{border-color:#6366f1}
button{width:100%;padding:12px;border-radius:8px;border:none;background:#6366f1;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
button:hover{background:#4f46e5}
.error{color:#ef4444;font-size:13px;text-align:center;margin-top:12px;display:none}
.lock-icon{text-align:center;font-size:36px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="lock-icon">🔒</div>
  <h1>Authentication Required</h1>
  <p>Enter the lock screen password to continue</p>
  <input type="password" id="password" placeholder="Password" autofocus>
  <button onclick="login()">Unlock</button>
  <div class="error" id="error">Invalid password</div>
</div>
<script>
async function login() {
  const password = document.getElementById('password').value;
  const error = document.getElementById('error');
  if (!password) { error.style.display = 'block'; error.textContent = 'Password required'; return; }
  try {
    const res = await fetch('/api/lock/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('lock_token', data.token);
      window.location.href = '/admin.html';
    } else {
      error.style.display = 'block'; error.textContent = 'Invalid password';
    }
  } catch(e) {
    error.style.display = 'block'; error.textContent = 'Connection error';
  }
}
document.getElementById('password').addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
